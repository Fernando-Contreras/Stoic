<html lang="en">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ── #9: zoom — max-width tighter + bigger base font ── */
:root{
  --bg:#09090f;--sur:#111118;--sur2:#17171f;--sur3:#1d1d26;
  --b1:#22222e;--b2:#2c2c3a;--b3:#3a3a4a;
  --t1:#f2f2f8;--t2:#b0b0cc;--t3:#707090;
  /* #10: warmer accent — soft amber-gold instead of cold teal */
  --ac:#d4a017;--ac2:#b8880e;--acd:rgba(212,160,23,.12);--acb:rgba(212,160,23,.28);
  /* negative = red */
  --ng:#f97316;--ngd:rgba(249,115,22,.13);--ngb:rgba(249,115,22,.30);
  /* status */
  --cr:#ff5566;--cy:#f5c842;--cg:#34d399;--cp:#a78bfa;
  --rd:rgba(255,85,102,.13);--yd:rgba(245,200,66,.13);--gd:rgba(52,211,153,.13);--pd:rgba(167,139,250,.13);
  --rb:rgba(255,85,102,.30);--yb:rgba(245,200,66,.30);--gb:rgba(52,211,153,.30);--pb:rgba(167,139,250,.30);
  --ff:'Outfit',sans-serif;--mo:'JetBrains Mono',monospace;
}
/* #9: base font 17px, max-width 1100px = natural 125–150% feel */
html,body{background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:20px;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
#root{max-width:1280px;margin:0 auto;padding:18px 24px 60px}

/* ── TYPOGRAPHY ── */
.mo{font-family:var(--mo)}
.xs{font-size:14px}.sm{font-size:16px}.md{font-size:18px}.lg{font-size:21px}.xl{font-size:26px}.xxl{font-size:32px}.xxxl{font-size:46px}
.w3{font-weight:300}.w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}.w7{font-weight:700}.w8{font-weight:800}
.dim{color:var(--t2)}.dimmer{color:var(--t3)}
.ac{color:var(--ac)}.ng{color:var(--ng)}
.cr{color:var(--cr)}.cy{color:var(--cy)}.cg{color:var(--cg)}.cp{color:var(--cp)}
.up{text-transform:uppercase}.ls{letter-spacing:.07em}
.ctr{text-align:center}

/* ── LAYOUT ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row{display:flex;align-items:center}
.rowb{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}
.f1{flex:1}.w100{width:100%}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.s4{display:flex;flex-direction:column;gap:4px}
.s6{display:flex;flex-direction:column;gap:6px}
.s8{display:flex;flex-direction:column;gap:8px}
.s10{display:flex;flex-direction:column;gap:10px}
.s12{display:flex;flex-direction:column;gap:12px}

/* ── CARD ── */
.card{background:var(--sur);border:1px solid var(--b1);border-radius:16px;padding:22px}
.card2{background:var(--sur2);border:1px solid var(--b1);border-radius:12px;padding:14px}
.card3{background:var(--sur3);border:1px solid var(--b1);border-radius:8px;padding:10px}
.ctit{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
hr.dv{border:none;border-top:1px solid var(--b1);margin:12px 0}

/* ── STATUS ── */
.s-red{background:var(--rd);border-color:var(--rb);color:var(--cr)}
.s-yellow{background:var(--yd);border-color:var(--yb);color:var(--cy)}
.s-green{background:var(--gd);border-color:var(--gb);color:var(--cg)}
.s-purple{background:var(--pd);border-color:var(--pb);color:var(--cp)}
.s-ac{background:var(--acd);border-color:var(--acb);color:var(--ac)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:1px solid}

/* ── INPUTS ── */
input[type=text],input[type=number],input[type=email],input[type=password],select{
  background:var(--sur2);border:1px solid var(--b2);border-radius:8px;
  color:var(--t1);font-family:var(--ff);font-size:16px;padding:10px 14px;
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%
}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px;cursor:pointer;flex-shrink:0}
input[type=number]::-webkit-inner-spin-button{opacity:.3}

/* ── BUTTONS ── */
button{cursor:pointer;font-family:var(--ff);font-size:15px;font-weight:600;border-radius:9px;border:none;padding:10px 18px;transition:all .15s;line-height:1.3}
.btn-ac{background:var(--ac);color:#ffffff;font-weight:800}
.btn-ac:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-ghost{background:var(--sur2);color:var(--t2);border:1px solid var(--b2)}
.btn-ghost:hover{color:var(--t1);border-color:var(--b3)}
.btn-ng{background:var(--ngd);color:var(--ng);border:1px solid var(--ngb)}
.btn-ng:hover{background:rgba(255,85,102,.22)}
.btn-icon{background:none;padding:4px 7px;color:var(--t3);border:none;border-radius:6px}
.btn-icon:hover{color:var(--t1);background:var(--sur3)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px;border-radius:5px}

/* ── TOGGLE ── */
.tog{display:flex;align-items:center;gap:12px;cursor:pointer;padding:13px 16px;border-radius:12px;border:1px solid var(--b1);background:var(--sur2);transition:all .15s;user-select:none}
.tog:hover{border-color:var(--b2)}
.tog.on{border-color:var(--ac);background:var(--acd)}
.tog.on .tt{color:var(--ac);font-weight:600}
.tt{font-size:16px;color:var(--t2)}
.ts{font-size:12px;color:var(--t3);margin-top:2px}

/* ── PROGRESS ── */
.prog{height:6px;border-radius:3px;background:var(--sur2);overflow:hidden}
.prog-f{height:100%;border-radius:3px;transition:width .3s}

/* ── STREAKS ── */
.sk-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.skc{border-radius:12px;padding:16px 12px;text-align:center;border:1px solid}
.skc.pos{background:var(--acd);border-color:var(--acb)}
.skc.neg{background:var(--ngd);border-color:var(--ngb)}
.skn{font-size:34px;font-weight:700;line-height:1;font-family:var(--mo)}
.skl{font-size:10px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

/* ── CALENDAR ── */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-c{aspect-ratio:.9;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all .12s;position:relative;overflow:hidden}
.cal-c:hover{filter:brightness(1.2)}
.cal-c.today{border-color:var(--ac)!important;box-shadow:0 0 0 1px var(--ac)}
.cal-c.sel{border-color:#fff!important}
.cal-num{font-size:14px;font-weight:800;position:relative;z-index:1}
.cal-pts{font-size:10px;font-weight:600;opacity:.95;margin-top:1px;font-family:var(--mo);position:relative;z-index:1}
/* #8: flag glow overlay */
.cal-flag-ring{position:absolute;inset:0;border-radius:6px;border:2px solid gold;box-shadow:inset 0 0 8px rgba(255,200,0,.3),0 0 8px rgba(255,200,0,.4);pointer-events:none;z-index:2}
.cal-flag-ico{position:absolute;top:1px;right:2px;font-size:14px;z-index:3;line-height:1}
.cal-hd{text-align:center;font-size:9px;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.05em}

/* ── PENALTY ITEM ── */
.pen-it{background:var(--sur2);border:1px solid var(--ngb);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── HISTORY ROW ── */
.hr-row{padding:9px 12px;border-radius:8px;border:1px solid var(--b1);background:var(--sur2);cursor:pointer;transition:border-color .15s}
.hr-row:hover{border-color:var(--b2)}
.hr-row.ed{border-color:var(--ac);background:var(--acd)}

/* ── SECTION TOGGLE ── */
.sec-t{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;padding:0 0 14px;color:var(--t3);cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.sec-t:hover{color:var(--t2)}

/* ── MISC ── */
.circ{transform:rotate(-90deg)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--cg);display:inline-block;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fi{animation:fi .18s ease}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.sk-g{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.g4{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.xxxl{font-size:30px}.xxl{font-size:24px}}

/* ── LIGHT MODE ── */
body.light{--bg:#f4f4f0;--sur:#ffffff;--sur2:#efefeb;--sur3:#e5e5e0;--b1:#ddddd8;--b2:#cacac4;--b3:#b0b0aa;--t1:#1a1a1a;--t2:#555550;--t3:#888880}
body.light .cal-c{filter:none}
body.light .cal-c:hover{filter:brightness(.92)}
body.light .cal-c[data-status=none]{background:#e8e8e4!important}
body.light .cal-c:hover{filter:brightness(.95)}
/* ── DIARY ── */
.diary-area{width:100%;min-height:90px;resize:vertical;background:var(--sur2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);font-family:var(--ff);font-size:15px;padding:10px 14px;outline:none;transition:border-color .15s;line-height:1.6}
.diary-area:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
</style>

const S={
  get(k,fb=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const K={TODAY:'st_today',HIST:'st_hist',AUTH:'st_auth',DIARY:'st_diary',THEME:'st_theme',STREAK_OVR:'st_streak_ovr'};

/* ── SUPABASE SYNC ──────────────────────────────────────────────────
   Uses window._SUPABASE_URL and window._SUPABASE_KEY if set.
   Table: stoic_data (user_id uuid PK, history jsonb, today jsonb)
   Falls back to localStorage silently if not configured.
   ────────────────────────────────────────────────────────────────── */
const SB={
  url: null, key: null, token: null,
  init(){
    // Accept URL with or without trailing /rest/v1/
    const raw = window._SUPABASE_URL||'';
    this.url = raw.replace(/\/rest\/v1\/?$/,'').replace(/\/+$/,'');
    this.key = window._SUPABASE_KEY||'';
    this.token = localStorage.getItem('AUTH_TOKEN')||'';
    return !!(this.url && this.key && this.token);
  },
  headers(){
    return {'Content-Type':'application/json','apikey':this.key,'Authorization':`Bearer ${this.token}`};
  },
  async push(history, today, diary, streakOverrides){
    if(!this.init()) return;
    try{
      const res=await fetch(`${this.url}/rest/v1/stoic_data`, {
        method:'POST',
        headers:{...this.headers(),'Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({
          user_id: this.userId(),
          history: history,
          today: today,
          diary: diary||{},
          streak_overrides: streakOverrides||{},
          saved_at: Date.now(),
          updated_at: new Date().toISOString()
        })
      });
      if(!res.ok){const t=await res.text();console.warn('Push failed:',res.status,t);}
    }catch(e){console.warn('Supabase push failed',e);}
  },
  async pull(){
    if(!this.init()) return null;
    try{
      const r=await fetch(`${this.url}/rest/v1/stoic_data?select=history,today,diary,streak_overrides,saved_at&limit=1`,{headers:this.headers()});
      if(!r.ok) return null;
      const rows=await r.json();
      return rows&&rows.length?rows[0]:null;
    }catch(e){console.warn('Supabase pull failed',e);return null;}
  },
  userId(){
    // Extract user_id from JWT token without external library
    try{
      const payload=this.token.split('.')[1];
      const decoded=JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
      return decoded.sub||null;
    }catch{return null;}
  },
  async login(email,password){
    this.url=(window._SUPABASE_URL||'').replace(/\/rest\/v1\/?$/,'').replace(/\/+$/,'');
    this.key=window._SUPABASE_KEY||'';
    if(!this.url||!this.key) return{error:'Supabase not configured'};
    try{
      const r=await fetch(`${this.url}/auth/v1/token?grant_type=password`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':this.key,'Authorization':`Bearer ${this.key}`},
        body:JSON.stringify({email,password})
      });
      const d=await r.json();
      if(d.access_token){
        this.token=d.access_token;
        localStorage.setItem('AUTH_TOKEN',d.access_token);
        return{ok:true};
      }
      return{error:d.error_description||d.msg||'Login failed'};
    }catch(e){return{error:'Network error'};}
  }
};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}

function parseDur(s){
  if(!s||!s.trim())return{v:0};s=s.trim();let m;
  if(m=s.match(/^(\d+)h(\d+)m$/))return{v:+m[1]*60+ +m[2]};
  if(m=s.match(/^(\d+(?:\.\d+)?)h$/))return{v:Math.round(parseFloat(m[1])*60)};
  if(m=s.match(/^(\d+)m$/))return{v:+m[1]};
  const n=parseInt(s);if(!isNaN(n)&&n>=0)return{v:n};
  return{v:null,err:t('use-dur')};
}
function fmtDur(min){
  if(!min)return'0m';const h=Math.floor(min/60),m=min%60;
  if(!h)return m+'m';if(!m)return h+'h';return h+'h'+m+'m';
}
function todayKey(){
  const storedTz=parseInt(localStorage.getItem('st_tz_offset'));
  const tzOffset=isNaN(storedTz)?new Date().getTimezoneOffset():storedTz;
  const n=new Date(Date.now()-tzOffset*60000);
  return n.getUTCFullYear()+'-'+String(n.getUTCMonth()+1).padStart(2,'0')+'-'+String(n.getUTCDate()).padStart(2,'0');
}
function initTimezone(){
  if(!localStorage.getItem('st_tz_offset')){
    localStorage.setItem('st_tz_offset',String(new Date().getTimezoneOffset()));
  }
}

/* ═══ CALC — SINGLE SOURCE OF TRUTH ═══ */
const CALC={
  status(pct,flag){
    let s=pct>=100?'purple':pct>=85?'green':pct>=50?'yellow':'red';
    if(flag){const u={red:'yellow',yellow:'green',green:'purple',purple:'purple'};s=u[s];}
    return s;
  },
  colorBonus(s){return{purple:60,green:30,yellow:10,red:0}[s]||0},
  penBase(p){
    const diff=(typeof STATE!=='undefined'?STATE.difficulty:null)||'easy';
    const mult=diff==='hard'?10:diff==='medium'?5:1;
    if(p.type==='drugs')return Math.round(-25*mult*(p.details?.substances||1));
    if(p.type==='internet')return Math.round(-1*mult*(p.details?.minutes||0));
    if(p.type==='macanazo')return p.details?.isPositive?100:Math.round(-100*mult);
    return 0;
  },
  diffMult(){
    const diff=(typeof STATE!=='undefined'?STATE.difficulty:null)||'easy';
    return diff==='hard'?10:diff==='medium'?5:1;
  },
  streaks(history,today){
    const tk=todayKey();
    // #1 FIX: exclude today from history scan entirely
    const hist=[...history].filter(d=>d.date!==tk).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const hasPen=(d,t)=>d.penalties?.some(p=>p.type===t)||false;
    const hasSt=(d,t)=>d.streaks?.some(s=>s.type===t&&s.active)||false;
    function pStrk(type,resetOn){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hasPen(hist[i],type))break;if(resetOn.includes(hist[i].status))break;c++;}return c;}
    function aStrk(type){let c=0;for(let i=hist.length-1;i>=0;i--){if(hasPen(hist[i],type))break;c++;}return c;}
    function sStrk(type){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hasSt(hist[i],type))break;c++;}return c;}
    function wStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(hist[i].status==='red')break;c++;}return c;}
    function eStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hist[i].sleptEarly)break;c++;}return c;}
    function cStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(hist[i].status==='red'||hist[i]._gap)break;c++;}return c;}
    function lStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hist[i].sleptLate||hist[i].status==='purple')break;c++;}return c;}
    const tD=today.penalties.some(p=>p.type==='drugs');
    const tN=today.penalties.some(p=>p.type==='internet');
    const tM=today.penalties.some(p=>p.type==='macanazo');
    const tLate=today.sleep?.sleptLate||false;

    // Calculate today's status to know which streaks reset TODAY
    const pct=today.target>0?Math.round((today.completed||0)/today.target*100):0;
    const todayStatus=CALC.status(pct, today.flagCompleted||false);

    // Rules:
    // Yellow+ → resets Substances
    // Green+  → resets Substances + Procrastination
    // Purple  → resets Substances + Procrastination + Orgasm + Slept Late
    // Red     → cuts Work streak (handled in wStrk)
    const todayResetsSubstances = ['yellow','green','purple'].includes(todayStatus);
    const todayResetsProcrast   = ['green','purple'].includes(todayStatus);
    const todayResetsMacanazo   = todayStatus==='purple';
    const todayResetsLate       = todayStatus==='purple';  // ONLY purple

    return{
      substancesPenaltyStreak:      todayResetsSubstances ? 0 : pStrk('drugs',['yellow','green','purple']) + (tD?1:0),
      procrastinationPenaltyStreak: todayResetsProcrast   ? 0 : pStrk('internet',['green','purple']) + (tN?1:0),
      macanazoPenaltyStreak:        todayResetsMacanazo   ? 0 : pStrk('macanazo',['purple']) + (tM?1:0),
      lateStreak:                   todayResetsLate        ? 0 : lStrk() + (tLate?1:0),
      // Positive streaks: unaffected by day color
      substancesStreak:tD?0:aStrk('drugs'),
      procrastinationStreak:tN?0:aStrk('internet'),
      macanazoStreak:tM?0:aStrk('macanazo'),
      morningStreak:sStrk('morning')+(today.morningCompleted?1:0),
      flagStreak:sStrk('flags')+(today.flagCompleted?1:0),
      workStreak:wStrk()+(today.work?.workDuration>0?1:0),
      earlyBedStreak:eStrk()+(today.sleep?.sleptEarly?1:0),
      colorStreak:cStrk(),
    };
  },
  score(day,sk){
    const{completed=0,target=0,morningCompleted=false,flagCompleted=false,pomodoros=0,penalties=[],sleep={},work={}}=day;
    const s=sk||{morningStreak:0,flagStreak:0,substancesPenaltyStreak:1,procrastinationPenaltyStreak:1,macanazoPenaltyStreak:1};
    const base=completed;
    const mB=morningCompleted?25*Math.max(1,s.morningStreak):0;
    const fB=flagCompleted?100*Math.max(1,s.flagStreak):0;
    const pom=pomodoros*25;
    const wrk=(work.workDuration||0)*Math.max(1,s.workStreak);
    const slp=(sleep.sleepDuration||0)+(sleep.napDuration||0)+(sleep.sleptEarly?(sleep.sleepDuration||0)*(sleep.earlyBedStreak||1):0);
    const latePen=sleep.sleptLate?-100*this.diffMult()*Math.max(1,s.lateStreak||1):0;
    const procMins=penalties.filter(p=>p.type==='internet').reduce((a,p)=>a+(p.details?.minutes||0),0);
    const procActive=procMins>30;
    const pen=penalties.reduce((sum,p)=>{
      const b=this.penBase(p);let mult=1;
      if(p.type==='drugs')mult=Math.max(1,s.substancesPenaltyStreak);
      else if(p.type==='internet')mult=procActive?Math.max(1,s.procrastinationPenaltyStreak):1;
      else if(p.type==='macanazo')mult=Math.max(1,s.macanazoPenaltyStreak);
      return sum+b*mult;
    },0);
    const pct=target>0?Math.round(completed/target*100):0;
    const status=this.status(pct,flagCompleted);
    const col=this.colorBonus(status)*Math.max(1,s.colorStreak||0);
    const total=base+mB+fB+pom+wrk+slp+pen+col+latePen;
    return{total,base,status,pct,mB,fB,pom,wrk,slp,pen,col,latePen};
  },
  // #2 FIX: histTotal must exclude today to avoid double-count
  histTotal(history){
    const tk=todayKey();
    return history.filter(h=>h.date!==tk).reduce((s,d)=>s+this.liveScore(d),0);
  },
  /* recompute a stored day's score using CURRENT difficulty (penalties scale with mode) */
  liveScore(e){
    if(e._gap)return e.todayPoints||-1000;
    const st=e.status||'red';
    // Streak resets by day color — same rules as CALC.streaks()
    const subsReset  =['yellow','green','purple'].includes(st);
    const procReset  =['green','purple'].includes(st);
    const macReset   = st==='purple';
    const lateReset  = st==='purple';
    // Positive components
    const pos=(e.completedTasks||0)
      +((e.streaks?.some(s=>s.type==='morning'&&s.active))?25*(e.streaksUsed?.morningStreak||1):0)
      +((e.streaks?.some(s=>s.type==='flags'&&s.active))?100*(e.streaksUsed?.flagStreak||1):0)
      +((e.pomodoros||0)*25)
      +((e.workDuration||0)*(e.streaksUsed?.workStreak||1))
      +((e.sleepDuration||0)+(e.napDuration||0)+(e.sleptEarly?(e.sleepDuration||0)*(e.streaksUsed?.earlyBedStreak||1):0))
      +(this.colorBonus(e.status))
      // slept late: if day was purple, streak resets to 0 so no penalty
      +(e.sleptLate&&!lateReset?-100*this.diffMult()*(e.streaksUsed?.lateStreak||1):0);
    // Penalties: recompute with current difficulty, but reset streak if day color resets it
    const pen=(e.penalties||[]).reduce((sum,p)=>{
      const det=p.type==='drugs'?{substances:p.count}:p.type==='internet'?{minutes:p.count}:{isPositive:false};
      const b=this.penBase({type:p.type,details:det});
      // If day color resets this penalty streak, cost is base×1 only (first day streak)
      let mult=1;
      if(p.type==='drugs'&&!subsReset) mult=p.streak||1;
      else if(p.type==='internet'&&!procReset) mult=p.streak||1;
      else if(p.type==='macanazo'&&!macReset) mult=p.streak||1;
      return sum+b*mult;
    },0);
    return pos+pen;
  },
  buildEntry(today,streaks,date){
    const sc=this.score(today,streaks);
    return{date,_ts:Date.now(),todayPoints:sc.total,status:sc.status,
      completedTasks:today.completed,totalTasks:today.target,pomodoros:today.pomodoros,
      penalties:today.penalties.map(p=>({type:p.type,count:p.count,points:this.penBase(p),streak:1})),
      streaks:[{type:'morning',count:today.morningCompleted?1:0,active:today.morningCompleted},{type:'flags',count:today.flagCompleted?1:0,active:today.flagCompleted}],
      sleepDuration:today.sleep?.sleepDuration||0,napDuration:today.sleep?.napDuration||0,
      sleptEarly:today.sleep?.sleptEarly||false,sleptLate:today.sleep?.sleptLate||false,workDuration:today.work?.workDuration||0,
      streaksUsed:{...streaks}};
  },
  /* #6: fill missing days between first and last history entry as red -1000 */
  fillGaps(history){
    // Only fill gaps BETWEEN real logged days (ignore gap-only entries when finding bounds)
    const realDays=history.filter(d=>!d._gap).map(d=>d.date).sort();
    if(realDays.length<2)return history;
    const map=new Map(history.map(d=>[d.date,d]));
    const start=new Date(realDays[0]+'T12:00:00'),end=new Date(realDays[realDays.length-1]+'T12:00:00');
    const result=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
      const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      result.push(map.get(k)||{date:k,todayPoints:-1000,status:'red',completedTasks:0,totalTasks:0,pomodoros:0,penalties:[],streaks:[],workDuration:0,sleepDuration:0,napDuration:0,sleptEarly:false,_gap:true});
    }
    return result;
  }
};

/* ═══ #1 FIX: loadToday checks for missed days, fills all gaps ═══ */
function loadToday(){
  const t=S.get(K.TODAY,null);
  if(t){STATE.today={...STATE.today,...t};if(t._penType)STATE.penType=t._penType;
    if(t._difficulty){STATE.difficulty=t._difficulty;localStorage.setItem('st_difficulty',t._difficulty);}
    if(t._lang){STATE.lang=t._lang;localStorage.setItem('st_lang',t._lang);}
  }
  const tk=todayKey();
  const saved=STATE.today._date||'';
  if(saved&&saved!==tk){
    // might have missed multiple days — fill each missing day as -1000 gap
    const savedDate=new Date(saved);
    const nowDate=new Date(tk);
    const daysDiff=Math.round((nowDate-savedDate)/(1000*60*60*24));
    // save the actual last-used day
    const sk=CALC.streaks(STATE.history,STATE.today);
    upsertHist(CALC.buildEntry(STATE.today,sk,saved),saved);
    // fill any days between saved and today as gap days
    for(let i=1;i<daysDiff;i++){
      const gapDate=new Date(savedDate);gapDate.setDate(gapDate.getDate()+i);
      const gk=gapDate.getFullYear()+'-'+String(gapDate.getMonth()+1).padStart(2,'0')+'-'+String(gapDate.getDate()).padStart(2,'0');
      if(!STATE.history.find(h=>h.date===gk)){
        upsertHist({date:gk,_ts:Date.now(),todayPoints:-1000,status:'red',completedTasks:0,totalTasks:0,pomodoros:0,penalties:[],streaks:[],workDuration:0,sleepDuration:0,napDuration:0,sleptEarly:false,_gap:true},gk);
        S.set(K.HIST,STATE.history);
        SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
      }
    }
    // reset today
    STATE.today={completed:0,target:0,morningCompleted:false,flagCompleted:false,
      pomodoros:0,penalties:[],
      sleep:{sleepDuration:0,napDuration:0,sleptEarly:false,earlyBedStreak:STATE.today.sleep?.earlyBedStreak||0},
      work:{workDuration:0},_date:tk};
  }
  if(!STATE.today._date)STATE.today._date=tk;
}

function upsertHist(entry,dk){
  const idx=STATE.history.findIndex(h=>h.date===dk);
  if(idx>=0)STATE.history[idx]={...STATE.history[idx],...entry};
  else STATE.history.unshift(entry);
  STATE.history=STATE.history.slice(0,200);
  S.set(K.HIST,STATE.history); // always persist locally
}

/* save: local + push to Supabase if logged in */
// commit() = user changed something real → bump _ts, push to cloud
function commit(){
  STATE.today._ts=Date.now(); // only bump when user actually changed data
  save();
}

function save(){
  const tk=todayKey();
  STATE.today._date=tk;
  STATE.today._penType=STATE.penType;
  STATE.today._difficulty=STATE.difficulty;
  STATE.today._lang=STATE.lang;
  STATE.today._theme=STATE.theme;
  STATE.today._tzOffset=new Date().getTimezoneOffset();
  const sk=CALC.streaks(STATE.history,STATE.today);
  upsertHist(CALC.buildEntry(STATE.today,sk,tk),tk);
  S.set(K.TODAY,STATE.today);
  S.set(K.HIST,STATE.history);
  S.set(K.DIARY,STATE.diary);
  S.set(K.THEME,STATE.theme);
  S.set(K.STREAK_OVR,STATE.streakOverrides);
  SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
}

/* ═══ SYNC — Supabase is the single source of truth ═══
   Philosophy: like Facebook — the server has the data,
   devices just read and write to it. No complex merging.
   
   WRITE: every save() pushes full state to Supabase immediately.
   READ:  every 8s, pull from Supabase. If it differs from local,
          take the remote version. Period. No merge logic.
   
   Conflict resolution: last writer wins (highest _ts on today,
   highest _ts per day in history). Simple and predictable.
   ══════════════════════════════════════════════════════════ */

function applyRemote(remote){
  // Called on boot and every bgSync — remote is always Supabase
  if(!remote) return false;
  let changed=false;
  const tk=todayKey();

  // TODAY: smart merge — newer _ts wins per field, penalties are unioned by id
  if(remote.today){
    const R=remote.today, L=STATE.today||{};
    const Rts=R._ts||0, Lts=L._ts||0;
    if(Rts!==Lts){ // only process if different
      let todayChanged=false;
      const merged={...L};
      // For scalar fields: remote wins if it has newer _ts
      if(Rts>Lts){
        // Remote is newer overall — take scalar fields from remote
        const scalars=['completed','target','morningCompleted','flagCompleted','pomodoros',
          'work','sleep','_date','_penType','_difficulty','_lang'];
        scalars.forEach(k=>{if(R[k]!==undefined&&JSON.stringify(R[k])!==JSON.stringify(L[k])){merged[k]=R[k];todayChanged=true;}});
      }
      // Penalties: UNION by id — keep all unique penalties from both devices
      const localPens=L.penalties||[];
      const remotePens=R.penalties||[];
      const penMap=new Map(localPens.map(p=>[p.id,p]));
      remotePens.forEach(p=>{
        if(!penMap.has(p.id)){penMap.set(p.id,p);todayChanged=true;}
      });
      merged.penalties=[...penMap.values()];
      // Keep highest _ts
      merged._ts=Math.max(Rts,Lts);
      if(todayChanged){
        STATE.today=merged;
        if(R._difficulty){STATE.difficulty=R._difficulty;localStorage.setItem('st_difficulty',R._difficulty);}
        if(R._theme&&R._theme!==STATE.theme){STATE.theme=R._theme;S.set(K.THEME,R._theme);applyTheme();}
        // Sync timezone — use the timezone of whichever device first saved
        if(R._tzOffset!==undefined&&!localStorage.getItem('st_tz_offset')){
          localStorage.setItem('st_tz_offset',R._tzOffset);
        }
        if(R._lang){STATE.lang=R._lang;localStorage.setItem('st_lang',R._lang);}
                if(R._penType&&Rts>Lts)STATE.penType=R._penType;
        S.set(K.TODAY,STATE.today);
        changed=true;
      }
    }
  }

  // HISTORY: per-day, remote entry wins if its _ts is newer
  if(Array.isArray(remote.history)&&remote.history.length){
    const localMap=new Map((STATE.history||[]).map(d=>[d.date,d]));
    let hChanged=false;
    remote.history.forEach(re=>{
      const le=localMap.get(re.date);
      if(!le||(re._ts||0)>(le._ts||0)){
        localMap.set(re.date,{...re});
        hChanged=true;
      }
    });
    if(hChanged){
      STATE.history=[...localMap.values()].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,200);
      S.set(K.HIST,STATE.history);
      changed=true;
    }
  }

  // DIARY: remote wins if it has more keys or different content
  if(remote.diary){
    const merged={...STATE.diary,...remote.diary};
    if(JSON.stringify(merged)!==JSON.stringify(STATE.diary)){
      STATE.diary=merged;
      S.set(K.DIARY,STATE.diary);
      changed=true;
    }
  }

  // STREAK OVERRIDES: remote wins
  if(remote.streak_overrides){
    const ro=remote.streak_overrides;
    if(JSON.stringify(ro)!==JSON.stringify(STATE.streakOverrides||{})){
      STATE.streakOverrides=ro;
      S.set(K.STREAK_OVR,STATE.streakOverrides);
      changed=true;
    }
  }

  return changed;
}

    info.innerHTML=`<span class="dim">${t('guest-only')}</span>`;
  }

  let mode='login';
  const modeRow=dv('row gap6');modeRow.style.marginTop='16px';
  const loginTab=bt('btn-ac btn-sm f1',t('log-in'),()=>{mode='login';syncTabs();});

  modeRow.appendChild(loginTab);modeRow.appendChild(signupTab);

  // fields
  const ew=dv('s4');ew.style.marginTop='12px';ew.innerHTML=`<div class="xs dimmer up ls">${t('email-lbl')}</div>`;
  const ei=ip('email','','','you@email.com');ew.appendChild(ei);card.appendChild(ew);
  const pw=dv('s4');pw.style.marginTop='8px';pw.innerHTML=`<div class="xs dimmer up ls">${t('pass-lbl')}</div>`;
  const pi=ip('password','','','min. 6 characters');pw.appendChild(pi);card.appendChild(pw);

  // feedback
  const err=dv('xs ng');err.style.marginTop='8px';card.appendChild(err);
  const succ=dv('xs cg');succ.style.marginTop='8px';card.appendChild(succ);

  // main button — declared before doAction so hoisting isn't an issue
  const actionBtn=bt('btn-ac',t('log-in'),()=>doAction());
  actionBtn.style.cssText='width:100%;margin-top:12px';
  card.appendChild(actionBtn);

  function syncTabs(){
    err.textContent='';succ.textContent='';
    if(mode==='login'){
      loginTab.className='btn-ac btn-sm f1';
      signupTab.className='btn-ghost btn-sm f1';
      actionBtn.textContent=t('log-in');
    } else {
      loginTab.className='btn-ghost btn-sm f1';
      signupTab.className='btn-ac btn-sm f1';
      actionBtn.textContent=t('create-acct');
    }
  }

  async function doAction(){
    err.textContent='';succ.textContent='';
    const email=ei.value.trim();
    const pass=pi.value;
    if(!email||!pass){err.textContent=t('enter-creds');return;}
    if(pass.length<6){err.textContent=t('pass-short');return;}
    if(!sbConfigured){err.textContent=t('not-configured');return;}

    actionBtn.disabled=true;
    actionBtn.textContent=mode==='login'?t('signing-in'):t('creating-acct');

    try{
      if(mode==='signup'){
        const sbUrl=(window._SUPABASE_URL||'').replace(/\/rest\/v1\/?$/,'').replace(/\/+$/,'');
        const sbKey=window._SUPABASE_KEY||'';
        const r=await fetch(`${sbUrl}/auth/v1/signup`,{
          method:'POST',
          headers:{'Content-Type':'application/json','apikey':sbKey,'Authorization':`Bearer ${sbKey}`},
          body:JSON.stringify({email,password:pass})
        });
        const d=await r.json();
        // Supabase returns user object on success
        if(d.id||d.user?.id||d.access_token){
          if(d.access_token){
            // email confirm disabled — logged in immediately
            SB.token=d.access_token;
            localStorage.setItem('AUTH_TOKEN',d.access_token);
            await afterLogin();
          } else {
            succ.textContent=t('acct-created');
            mode='login';syncTabs();
          }
        } else {
          err.textContent=d.msg||d.error_description||d.message||JSON.stringify(d);
        }
      } else {
        const res=await SB.login(email,pass);
        if(res.ok){
          await afterLogin();
        } else {
          err.textContent=res.error||t('login-failed');
        }
      }
    } catch(e){
      err.textContent=t('net-error')+e.message;
    }
    actionBtn.disabled=false;
    syncTabs();
  }

  async function afterLogin(){
    actionBtn.textContent=t('syncing');
    const remote=await SB.pull();
    applyRemote(remote);
    S.set(K.AUTH,true);STATE.authed=true;render();
  }

  pi.onkeydown=e=>{if(e.key==='Enter')doAction();};
  card.appendChild(hr());
  const gb=bt('btn-ghost',t('guest-btn'),()=>{S.set(K.AUTH,true);STATE.authed=true;render();});
  gb.style.width='100%';card.appendChild(gb);
  card.appendChild(dv('xs dimmer ctr mt8',t('guest-note')));
  wrap.appendChild(card);return wrap;
}

  const ovr=STATE.streakOverrides||{};
  const sk_={...sk_raw};
  const opposites={
    earlyBedStreak:'lateStreak',lateStreak:'earlyBedStreak',
    substancesStreak:'substancesPenaltyStreak',substancesPenaltyStreak:'substancesStreak',
    procrastinationStreak:'procrastinationPenaltyStreak',procrastinationPenaltyStreak:'procrastinationStreak',
    macanazoStreak:'macanazoPenaltyStreak',macanazoPenaltyStreak:'macanazoStreak',
  };
  // Penalty streaks that get reset by purple/green/yellow days
  // If the calculated value is 0 (reset happened), override must also be 0
  const penaltyStreakResetKeys=['substancesPenaltyStreak','procrastinationPenaltyStreak','macanazoPenaltyStreak','lateStreak']; // all reset to 0 by day color
  Object.entries(ovr).forEach(([k,v])=>{

/* ═══ PENALTY CARD — #3 keep type, #4 enter = add ═══ */
function renderPenCard(sk_){
  const card=dv('card');
  card.style.borderColor='var(--ngb)';
  const penPts=STATE.today.penalties.reduce((sum,p)=>{
    const b=CALC.penBase(p);const procMins=STATE.today.penalties.filter(x=>x.type==='internet').reduce((s,x)=>s+(x.details?.minutes||0),0);
    let m=1;
    if(p.type==='drugs')m=Math.max(1,sk_.substancesPenaltyStreak);
    else if(p.type==='internet')m=procMins>30?Math.max(1,sk_.procrastinationPenaltyStreak):0;
    else if(p.type==='macanazo')m=Math.max(1,sk_.macanazoPenaltyStreak);
    return sum+b*m;
  },0);
  const tr=dv('rowb mb10');tr.appendChild(sp('ctit',t('rewards-lbl')));if(penPts!==0)tr.appendChild(sp('md mo w7 ng',String(penPts)));card.appendChild(tr);

  // #3: use STATE.penType so selection persists after refresh
  const tEl=sk('mb8',[['drugs',t('pen-indulg')],['internet',t('pen-proc')],['macanazo',t('pen-org')]],STATE.penType);
  tEl.onchange=()=>{STATE.penType=tEl.value;updateDet();};
  card.appendChild(tEl);

  const dw=dv('mb8');
  const si=ip('number','',1,t('num-subs'));si.min=1;
  const pi=ip('text','','',t('eg-time'));
  const errD=dv('xs ng mb8');

  function doAdd(){
    errD.textContent='';
    const type=tEl.value;
    if(type==='drugs'){
      const n=parseInt(si.value)||0;if(n<1){errD.textContent=t('min-1');return;}
      STATE.today.penalties.push({id:uid(),type:'drugs',count:n,details:{substances:n},timestamp:new Date().toISOString()});
      si.value='1';
    }else if(type==='internet'){
      const r=parseDur(pi.value);if(r.v===null){errD.textContent=r.err;return;}if(r.v===0){errD.textContent=t('enter-time');return;}
      STATE.today.penalties.push({id:uid(),type:'internet',count:r.v,details:{minutes:r.v},timestamp:new Date().toISOString()});
      pi.value='';
    }else{
      STATE.today.penalties.push({id:uid(),type:'macanazo',count:1,details:{isPositive:false},timestamp:new Date().toISOString()});
    }
    // #3: do NOT reset tEl — keep selection
    commitAndRefresh();
  }
  // #4: enter key support for all penalty inputs
  si.onkeydown=e=>{if(e.key==='Enter')doAdd();};
  pi.onkeydown=e=>{if(e.key==='Enter')doAdd();};

  function updateDet(){dw.innerHTML='';if(tEl.value==='drugs')dw.appendChild(si);else if(tEl.value==='internet')dw.appendChild(pi);}
  updateDet();card.appendChild(dw);card.appendChild(errD);
  const ab=bt('btn-ng btn-sm w100',t('add-btn'),doAdd);ab.style.width='100%';card.appendChild(ab);

  if(STATE.today.penalties.length){

      else if(p.type==='macanazo') mult=Math.max(1,sk_.macanazoPenaltyStreak);
      const actual=base*mult;
      const lbl=p.type==='drugs'?`${t('indulg-x')}${p.details?.substances||1}`:p.type==='internet'?`${t('procrast-s')} ${fmtDur(p.details?.minutes||0)}`:t('pen-org').replace('💦 ','');
      const row=dv('pen-it');

      // Show label + breakdown: base × streak = actual
      const breakdown = mult>1 ? `<span class="xs dimmer">${base} × ${mult} ${t('streak-lbl')}</span>` : `<span class="xs dimmer">${t('base-lbl')}</span>`;
      info.innerHTML=`<div class="md dim">${lbl}</div><div class="row gap6 mt2">${breakdown}<span class="sm mo w7 ng">${actual}</span></div>`;
      const rm=bt('btn-icon','✕',()=>{STATE.today.penalties=STATE.today.penalties.filter(x=>x.id!==p.id);commitAndRefresh();});
      row.appendChild(info);row.appendChild(rm);list.appendChild(row);
    });card.appendChild(list);
  }
  return card;
}

  }

/* ═══ HISTORY EDITOR — #2 save triggers full refresh ═══ */
function renderHistEd(sk_){
  const wrap=dv('card');wrap.appendChild(sp('ctit',t('edit-hist')));
  let edKey=null,fst={},vis=7;
  function buildDays(){
    const days=[];const today=new Date();
    for(let i=0;i<=30;i++){
      const d=new Date(today);d.setDate(d.getDate()-i);
      const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      days.push({key,entry:STATE.history.find(h=>h.date===key),isToday:i===0});
    }return days;
  }
  function build(){
    while(wrap.children.length>1)wrap.removeChild(wrap.lastChild);
    const days=buildDays();const list=dv('s6');
    // Most recent day shown = today (i=0); that's where we show reset emojis
    const todaySt=CALC.score(STATE.today,sk_).status;
    // Most recent logged key = today if it has tasks/data, else last history entry
    const shownKeys=days.slice(0,vis).map(d=>d.key);
    const mostRecentKey=shownKeys[0]; // always today
    function resetEmojis(status){
      if(status==='red')return'💼🔄';
      if(status==='yellow')return'💊🔄';
      if(status==='green')return'💊🌐🔄';
      if(status==='purple')return'💊🌐💦🌙🔄';
      return'';
    }
    function resetTooltip(status){
      if(status==='red')return t('reset-work');
      if(status==='yellow')return t('reset-indulg');
      if(status==='green')return t('reset-ip');
      if(status==='purple')return t('reset-all');
      return'';
    }
    // Pre-pass: find most recent day key for each color (today wins for its color)
    const mostRecentForColor={};
    // today is always most recent for its own color
    mostRecentForColor[todaySt]='today';
    // scan history entries in order (days is already newest-first)
    days.slice(0,vis).forEach(({key,entry,isToday})=>{
      if(isToday)return;
      if(entry&&!entry._gap&&!mostRecentForColor[entry.status]){
        mostRecentForColor[entry.status]=key;
      }
    });
    days.slice(0,vis).forEach(({key,entry,isToday})=>{
      const isEd=edKey===key;const row=dv(`hr-row${isEd?' ed':''}`);
      const hd=dv('rowb');const lft=dv('row gap6');
      lft.appendChild(sp('sm mo dim',key));
      if(isToday){
        // TODAY badge: colored by current day status
        const b=sp(`badge s-${todaySt}`,t('Today'));b.style.marginLeft='4px';lft.appendChild(b);
        // Reset emojis only if today is the most recent of its color
        if(mostRecentForColor[todaySt]==='today'){
          const re=sp('xs dimmer',' '+resetEmojis(todaySt));re.style.marginLeft='2px';re.title=resetTooltip(todaySt);re.style.cursor='help';lft.appendChild(re);
        }
      }
      if(entry&&!isToday)lft.appendChild(sbadge(entry.status));
      if(entry?._gap)lft.appendChild(sp('xs ng',' '+t('gap-warn')));
      // Show reset emojis only on the most recent historical entry of its color
      if(!isToday&&entry&&!entry._gap&&mostRecentForColor[entry.status]===key){
        const re=sp('xs dimmer',' '+resetEmojis(entry.status));re.style.marginLeft='4px';re.title=resetTooltip(entry.status);re.style.cursor='help';lft.appendChild(re);
      }
      hd.appendChild(lft);
      const rgt=dv('row gap6');
      if(entry)rgt.appendChild(sp('sm mo dimmer',`${CALC.liveScore(entry)}pt`));
      const eb=bt('btn-icon',isEd?'✕':'✏',()=>{
        if(isEd){edKey=null;}
        else{
          edKey=key;const e=entry;
          fst={completed:e?.completedTasks||0,target:e?.totalTasks||0,pomodoros:e?.pomodoros||0,workDuration:e?.workDuration||0,
            sleepDuration:e?.sleepDuration||0,napDuration:e?.napDuration||0,sleptEarly:e?.sleptEarly||false,
            morningCompleted:e?.streaks?.some(s=>s.type==='morning'&&s.active)||false,
            flagCompleted:e?.streaks?.some(s=>s.type==='flags'&&s.active)||false,
            sleptLate:e?.sleptLate||false,
            substances:e?.penalties?.find(p=>p.type==='drugs')?.count||0,
            procMins:e?.penalties?.find(p=>p.type==='internet')?.count||0,
            macanazoCount:e?.penalties?.filter(p=>p.type==='macanazo')?.length||0};
        }build();
      });
      rgt.appendChild(eb);hd.appendChild(rgt);row.appendChild(hd);
      if(isEd){
        const form=dv('fi mt10');const g=dv('g2 mb10');g.style.gap='6px';
        function nf(label,val,onChange){const w=dv('s4');w.innerHTML=`<div class="xs dimmer up ls">${label}</div>`;const i=ip('number','',val,'');i.min=0;i.style.width='100%';i.oninput=()=>onChange(parseInt(i.value)||0);i.onkeydown=e=>{if(e.key==='Enter')i.blur();};w.appendChild(i);return w;}
        function df(label,val,onChange){const w=dv('s4');w.innerHTML=`<div class="xs dimmer up ls">${label}</div>`;const i=ip('text','',val?fmtDur(val):'',t('ej-dur'));i.style.width='100%';i.oninput=()=>{const r=parseDur(i.value);if(r.v!==null)onChange(r.v);};i.onkeydown=e=>{if(e.key==='Enter')i.blur();};w.appendChild(i);return w;}
        g.appendChild(nf(t('daily-tasks'),fst.completed,v=>fst.completed=v));g.appendChild(nf(t('target-ph'),fst.target,v=>fst.target=v));
        g.appendChild(nf(t('pom-lbl'),fst.pomodoros,v=>fst.pomodoros=v));g.appendChild(df(t('work-lbl'),fst.workDuration,v=>fst.workDuration=v));
        g.appendChild(df(t('main-sleep'),fst.sleepDuration,v=>fst.sleepDuration=v));g.appendChild(df(t('nap-lbl'),fst.napDuration,v=>fst.napDuration=v));
        g.appendChild(nf(t('indulg-hash'),fst.substances,v=>fst.substances=v));g.appendChild(df(t('proc-lbl'),fst.procMins,v=>fst.procMins=v));
        g.appendChild(nf(t('org-hash'),fst.macanazoCount,v=>fst.macanazoCount=v));form.appendChild(g);
        const cks=dv('row gap16 mb10');

        cks.appendChild(ck(t('morning-routine'),fst.morningCompleted,v=>fst.morningCompleted=v));cks.appendChild(ck(t('goals-ann'),fst.flagCompleted,v=>fst.flagCompleted=v));cks.appendChild(ck(t('early-bed'),fst.sleptEarly,v=>fst.sleptEarly=v));cks.appendChild(ck(t('late-bed'),fst.sleptLate,v=>fst.sleptLate=v));form.appendChild(cks);
        const sb=bt('btn-ac btn-sm',t('save-btn'),()=>{
          const pens=[];
          if(fst.substances>0)pens.push({type:'drugs',count:fst.substances,points:-250*fst.substances,streak:1});
          if(fst.procMins>0)pens.push({type:'internet',count:fst.procMins,points:-10*fst.procMins,streak:1});
          for(let i=0;i<fst.macanazoCount;i++)pens.push({type:'macanazo',count:1,points:-1000,streak:1});
          const mockDay={completed:fst.completed,target:fst.target,morningCompleted:fst.morningCompleted,flagCompleted:fst.flagCompleted,pomodoros:fst.pomodoros,
            penalties:pens.map(p=>({type:p.type,count:p.count,details:p.type==='drugs'?{substances:p.count}:p.type==='internet'?{minutes:p.count}:{isPositive:false}})),
            sleep:{sleepDuration:fst.sleepDuration,napDuration:fst.napDuration,sleptEarly:fst.sleptEarly,earlyBedStreak:1},work:{workDuration:fst.workDuration}};
          const fsk={morningStreak:1,flagStreak:1,substancesPenaltyStreak:1,procrastinationPenaltyStreak:1,macanazoPenaltyStreak:1,substancesStreak:0,procrastinationStreak:0,macanazoStreak:0,workStreak:0};
          const sc_=CALC.score(mockDay,fsk);
          upsertHist({date:key,_ts:Date.now(),todayPoints:sc_.total,status:sc_.status,completedTasks:fst.completed,totalTasks:fst.target,pomodoros:fst.pomodoros,sleepDuration:fst.sleepDuration,napDuration:fst.napDuration,sleptEarly:fst.sleptEarly,workDuration:fst.workDuration,penalties:pens,_gap:false,
            streaks:[{type:'morning',count:fst.morningCompleted?1:0,active:fst.morningCompleted},{type:'flags',count:fst.flagCompleted?1:0,active:fst.flagCompleted}]},key);
          // Save locally AND push to Supabase immediately
          S.set(K.HIST,STATE.history);
          SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
          edKey=null;
          refresh();
        });form.appendChild(sb);row.appendChild(form);
      }
      list.appendChild(row);
    });
    wrap.appendChild(list);
    if(vis<31){const mb=bt('btn-ghost btn-sm w100 mt8',t('show-more'),()=>{vis+=7;build();});mb.style.width='100%';wrap.appendChild(mb);}
  }
  build();return wrap;
}

  const allPts=STATE.history.filter(d=>!d._gap).map(d=>CALC.liveScore(d));
  const last7=STATE.history.filter(d=>!d._gap).slice(0,7).map(d=>CALC.liveScore(d));
  const best=allPts.length?Math.max(...allPts):0;
  const worst=allPts.length?Math.min(...allPts):0;
  const avg=allPts.length?Math.round(allPts.reduce((a,b)=>a+b,0)/allPts.length):0;
  const avg7=last7.length?Math.round(last7.reduce((a,b)=>a+b,0)/last7.length):0;
  const totalPoms=STATE.history.reduce((s,d)=>s+(d.pomodoros||0),0)+(STATE.today.pomodoros||0);
  const totalWorkMin=STATE.history.reduce((s,d)=>s+(d.workDuration||0),0)+(STATE.today.work?.workDuration||0);
  const drugFreeDays=STATE.history.filter(d=>!d.penalties?.some(p=>p.type==='drugs')&&!d._gap).length;
  const totalTracked=STATE.history.filter(d=>!d._gap).length;
  const dfPct=totalTracked?Math.round(drugFreeDays/totalTracked*100):100;
  const macDays=STATE.history.filter(d=>d.penalties?.some(p=>p.type==='macanazo')).length;
  const momentum=avg>0?Math.round((avg7-avg)/avg*100):0;
  const momStr=momentum>0?`+${momentum}%`:momentum<0?`${momentum}%`:'—';
  const earlyNights=STATE.history.filter(d=>d.sleptEarly).length;
  // best streak (consecutive non-red days)
  const sortedH=[...STATE.history].sort((a,b)=>new Date(a.date)-new Date(b.date));
  let bStrk=0,curStrk=0;sortedH.forEach(d=>{if(d.status!=='red'&&!d._gap){curStrk++;bStrk=Math.max(bStrk,curStrk);}else curStrk=0;});
  // penalty-free streak
  let pfStrk=0;for(let i=0;i<sortedH.length;i++){if(!sortedH[sortedH.length-1-i].penalties?.length&&!sortedH[sortedH.length-1-i]._gap)pfStrk++;else break;}
  // total sleep hours
  const totalSleepMin=STATE.history.reduce((s,d)=>s+(d.sleepDuration||0),0)+(STATE.today.sleep?.sleepDuration||0);
  const counts={purple:0,green:0,yellow:0,red:0};STATE.history.forEach(d=>counts[d.status]=(counts[d.status]||0)+1);
  const purplePct=totalTracked?Math.round((counts.purple/totalTracked)*100):0;

  // Insight
  const totalIndulgences=STATE.history.reduce((s,d)=>s+(d.penalties?.filter(p=>p.type==='drugs').reduce((a,p)=>a+(p.count||1),0)||0),0);
  const totalOrgasms=STATE.history.reduce((s,d)=>s+(d.penalties?.filter(p=>p.type==='macanazo').length||0),0);
  const avgSleepMin=totalTracked>0?Math.round(STATE.history.filter(d=>!d._gap).reduce((s,d)=>s+(d.sleepDuration||0),0)/totalTracked):0;
  const pomPerDay=totalTracked>0?Math.round(totalPoms/totalTracked*10)/10:0;
  const workDays=STATE.history.filter(d=>!d._gap&&(d.workDuration||0)>0).length;
  const workPct=totalTracked>0?Math.round(workDays/totalTracked*100):0;
  const lateNights=STATE.history.filter(d=>d.sleptLate).length;
  let insight='';
  if(totalTracked<3)insight=STATE.lang==='es'?'Sigue registrando días para ver estadísticas personalizadas.':'Keep logging days to see personalized insights.';
  else if(momentum>20)insight=`🚀 Momentum +${momentum}% — your last 7 days beat your all-time average.`;
  else if(momentum<-20)insight=`📉 Semana difícil (${momentum}%). Progress isn't linear. Tomorrow is a new day.`;
  else if(dfPct===100)insight=STATE.lang==='es'?'🌟 100% de días sin sustancias. Disciplina consistente.':'🌟 100% substance-free days. Consistent discipline.';
  else if(pfStrk>7)insight=STATE.lang==='es'?`✨ ${pfStrk} días consecutivos sin penalizaciones. ¡Racha limpia!`:`✨ ${pfStrk} consecutive days with no penalties. Clean streak!`;
  else if(totalPoms>50)insight=STATE.lang==='es'?`🍅 ${totalPoms} pomodoros = ${Math.round(totalPoms*25/60)}h de trabajo enfocado.`:`🍅 ${totalPoms} pomodoros = ${Math.round(totalPoms*25/60)}h of focused work.`;
  else insight=STATE.lang==='es'?'📊 Construyendo historial. Más datos = mejores estadísticas.':'📊 Building history. More data = better insights.';

  // Grid 1
  const g1=dv('g4 mb10');g1.style.gap='8px';
  [[t('best-day'),best,'var(--ac)',t('pts-s')],[t('worst-day'),worst,'var(--ac)',t('pts-s')],[t('all-avg'),avg,'var(--ac)',t('pts-day')],[t('last7-avg'),avg7,'var(--ac)',t('pts-s')]].forEach(([l,v,c,sub])=>{
    const s=dv('card2 ctr');const n=dv('xxl w7 mo');n.style.color=c;n.textContent=String(v);s.appendChild(n);s.appendChild(dv('xs dimmer mt4',l));g1.appendChild(s);
  });body.appendChild(g1);

  // Grid 2
  const g2=dv('g4 mb10');g2.style.gap='8px';
  [[t('total-poms'),String(totalPoms),'var(--ac)',t('poms-sub')],[t('work-total'),fmtDur(totalWorkMin),'var(--ac)',t('worked-sub')],[t('sleep-total'),fmtDur(totalSleepMin),'var(--ac)',t('rested-sub')],[t('clean-streak'),pfStrk+'d','var(--ac)',t('rf-sub')]].forEach(([l,v,c,sub])=>{
    const s=dv('card2 ctr');const n=dv('xl w7 mo');n.style.color=c;n.textContent=v;s.appendChild(n);s.appendChild(dv('xs dimmer mt4',l));g2.appendChild(s);
  });body.appendChild(g2);

  // Compute clean pcts for proc and orgasm
  const procFreeDays=STATE.history.filter(d=>!d.penalties?.some(p=>p.type==='internet')&&!d._gap).length;
  const procFreePct=totalTracked?Math.round(procFreeDays/totalTracked*100):100;
  const orgFreeDays=STATE.history.filter(d=>!d.penalties?.some(p=>p.type==='macanazo')&&!d._gap).length;
  const orgFreePct=totalTracked?Math.round(orgFreeDays/totalTracked*100):100;

  // Grid 3 — clean days
  function statCard(label,value,color,sub){

    s.appendChild(n);s.appendChild(dv('xs dimmer mt4',label));return s;
  }
  const g3=dv('g4 mb12');g3.style.gap='8px';
  [
    [t('clean-drugs'),dfPct+'%','var(--ac)',t('no-subs')],

    [t('clean-org'),orgFreePct+'%','var(--ac)',t('no-org')],
    [t('early-nights'),earlyNights+'d','var(--cg)',t('se-sub')],
  ].forEach(([l,v,c,sub])=>g3.appendChild(statCard(l,v,c,sub)));
  body.appendChild(g3);

  // Grid 4 — activity
  const g4b=dv('g4 mb10');g4b.style.gap='8px';
  [
    [t('avg-sleep'),fmtDur(avgSleepMin),'var(--ac)',t('per-night')],
    [t('poms-day'),String(pomPerDay),'var(--ac)',t('focused-sub')],
    [t('work-days-lbl'),workPct+'%','var(--ac)',t('of-logged')],
    [t('late-nights-lbl'),lateNights+'d','var(--ng)',t('stayed-up')],
  ].forEach(([l,v,c,sub])=>g4b.appendChild(statCard(l,v,c,sub)));
  body.appendChild(g4b);

  // Grid 5 — rewards totals
  const g5b=dv('g4 mb12');g5b.style.gap='8px';
  [
    [t('pen-indulg').replace('💊 ',''),String(totalIndulgences),'var(--ng)',t('total-logged')],
    [t('pen-org').replace('💦 ',''),String(totalOrgasms),'var(--ng)',t('total-logged')],
    [STATE.lang==='es'?'Sin castigos':'Reward-free',pfStrk+'d','var(--cg)',t('streak-now')],

  body.appendChild(g5b);
  // Day counts
  const dr=dv('row gap8 mb12');
  [['purple','🟣'],['green','🟢'],['yellow','🟡'],['red','🔴']].forEach(([s,e])=>dr.appendChild(sp(`badge s-${s}`,`${e} ${counts[s]}d`)));
  body.appendChild(dr);

  // Insight box
  const ib=dv('card2 s-ac fi');ib.appendChild(sp('sm dim',insight));body.appendChild(ib);
  wrap.appendChild(body);return wrap;
}

/* ═══ CLOUD SYNC PANEL ═══ */
function renderSyncPanel(){
  const card=dv('card fi mb12');
  card.style.cssText='border:1px solid var(--acb);background:var(--acd)';
  const hd=dv('rowb mb12');
  hd.appendChild(sp('ctit',t('sync-title')));
  hd.appendChild(bt('btn-icon','✕',()=>{STATE.showSyncPanel=false;refresh()}));
  card.appendChild(hd);
  const sbConfigured=!!(window._SUPABASE_URL&&window._SUPABASE_KEY);
  if(!sbConfigured){
    card.appendChild(dv('sm dim','Supabase not configured. Add window._SUPABASE_URL and window._SUPABASE_KEY to the HTML.'));
    return card;
  }
  const hasToken=!!(localStorage.getItem('AUTH_TOKEN'));
  if(hasToken){
    const info=dv('sm cg mb8');info.textContent=t('logged-in');card.appendChild(info);
    const row=dv('row gap8');
    row.appendChild(bt('btn-ac btn-sm',t('pull-cloud'),async()=>{
      const remote=await SB.pull();
      if(remote){
        // Force-apply remote — remote is the source of truth for manual pull
        // Temporarily bump remote _ts so applyRemote accepts everything
        if(remote.today) remote.today._ts=(remote.today._ts||0)+1;
        if(remote.history) remote.history=remote.history.map(d=>({...d,_ts:(d._ts||0)+1}));
        applyRemote(remote);
        S.set(K.HIST,STATE.history);S.set(K.TODAY,STATE.today);
        S.set(K.DIARY,STATE.diary);S.set(K.STREAK_OVR,STATE.streakOverrides);
        refresh();alert('✅ Synced from cloud!');
      } else alert('Pull failed or no data.');
    }));
    row.appendChild(bt('btn-ghost btn-sm',t('push-cloud'),async()=>{
      await SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides);alert('Pushed to cloud!');
    }));
    row.appendChild(bt('btn-ng btn-sm',t('log-out'),()=>{
      localStorage.removeItem('AUTH_TOKEN');STATE.showSyncPanel=false;refresh();
    }));
    card.appendChild(row);
    return card;
  }
  // Not logged in — show login form
  card.appendChild(dv('sm dim mb10','Log in with your Supabase account to enable cross-device sync.'));
  const ew=dv('s4 mb8');ew.innerHTML=`<div class="xs dimmer up ls">${t('email-lbl')}</div>`;
  const ei=ip('email','','','you@email.com');ew.appendChild(ei);card.appendChild(ew);
  const pw=dv('s4 mb8');pw.innerHTML=`<div class="xs dimmer up ls">${t('pass-lbl')}</div>`;
  const pi=ip('password','','','password');pw.appendChild(pi);card.appendChild(pw);
  const err=dv('xs ng mb8');card.appendChild(err);
  const loginBtn=bt('btn-ac btn-sm','Log In',async()=>{
    err.textContent='';loginBtn.disabled=true;loginBtn.textContent='Logging in...';
    const res=await SB.login(ei.value.trim(),pi.value);
    if(res.ok){STATE.showSyncPanel=false;refresh();}
    else{err.textContent=res.error||t('login-failed');loginBtn.disabled=false;loginBtn.textContent='Log In';}
  });
  pi.onkeydown=e=>{if(e.key==='Enter')loginBtn.click();};
  card.appendChild(loginBtn);
  return card;
}

/* ═══ STREAK OVERRIDE PANEL ═══ */
function renderStreakPanel(){
  const card=dv('card fi mb12');
  card.style.cssText='border:1px solid var(--acb);background:var(--acd)';

  const hd=dv('rowb mb12');
  hd.appendChild(sp('ctit',t('set-streaks-t')));
  hd.appendChild(bt('btn-icon','✕',()=>{STATE.showStreakPanel=false;refresh()}));
  card.appendChild(hd);

  const info=dv('sm dim mb12');
  info.textContent=t('set-streaks-info');
  card.appendChild(info);

  const ovr=STATE.streakOverrides;
  // Pairs that cancel each other out — setting one clears the other
  const mutuallyExclusive={
    earlyBedStreak:'lateStreak',
    lateStreak:'earlyBedStreak',
    substancesStreak:'substancesPenaltyStreak',
    substancesPenaltyStreak:'substancesStreak',
    procrastinationStreak:'procrastinationPenaltyStreak',
    procrastinationPenaltyStreak:'procrastinationStreak',
    macanazoStreak:'macanazoPenaltyStreak',
    macanazoPenaltyStreak:'macanazoStreak',
  };

  const streakDefs=[
    // ── Positive streaks ──────────────────────────
    {k:'morningStreak',      l:t('sk-morning'),  emoji:'🌅', section:'pos'},
    {k:'flagStreak',         l:t('goals-ann'),   emoji:'🏅', section:'pos'},
    {k:'workStreak',         l:t('work-lbl'),    emoji:'💼', section:'pos'},
    {k:'earlyBedStreak',     l:'Slept Early',    emoji:'😴', section:'pos'},
    {k:'substancesStreak',   l:t('sk-ci'),       emoji:'✅', section:'pos'},
    {k:'procrastinationStreak',l:t('sk-cp'),     emoji:'✅', section:'pos'},
    {k:'macanazoStreak',     l:t('sk-co'),       emoji:'✅', section:'pos'},
    // ── Reward (negative) streaks ─────────────────
    {k:'substancesPenaltyStreak',     l:t('sk-i'), emoji:'💊', section:'neg'},
    {k:'procrastinationPenaltyStreak',l:t('sk-p'), emoji:'🌐', section:'neg'},
    {k:'macanazoPenaltyStreak',       l:t('sk-o'), emoji:'💦', section:'neg'},
    {k:'lateStreak',                  l:t('sk-l'), emoji:'🌙', section:'neg'},
  ];

  // Track input elements by key so mutual exclusion can clear them
  const inputRefs={};

  function buildSection(defs, sectionTitle, sectionClass){
    const wrap=dv('mb12');
    const lbl=dv(`xs dimmer up ls mb8 ${sectionClass}`);lbl.textContent=sectionTitle;wrap.appendChild(lbl);
    const g=dv('g2');g.style.gap='8px';
    defs.forEach(({k,l,emoji})=>{
      const row=dv('card2 row gap10');
      const lbl2=dv('f1 sm');lbl2.textContent=emoji+' '+l;
      const i=ip('number','',ovr[k]!==undefined?ovr[k]:'','auto');
      i.min=0;i.style.cssText='width:80px;flex:0 0 auto;text-align:center';
      i.placeholder='auto';
      inputRefs[k]=i;
      i.onkeydown=e=>{
        if(e.key==='Enter'){
          const v=parseInt(i.value);
          if(!isNaN(v)&&v>=0){
            if(v===0){
              // 0 = clear, use calculated value
              delete STATE.streakOverrides[k];
              i.value='';
              i.placeholder='auto';
              S.set(K.STREAK_OVR,STATE.streakOverrides);
              SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
              refresh();
            } else {
              // Inject into the most recent history entry's streaksUsed
              // so the natural calculation picks it up as baseline
              // Then clear the override — history does the work from now on
              const tk=todayKey();
              // Find the most recent history entry that is NOT today
              const recentEntry=STATE.history.find(h=>h.date!==tk&&!h._gap);
              if(recentEntry){
                if(!recentEntry.streaksUsed) recentEntry.streaksUsed={};
                // Set the streak to v-1 in the last history entry
                // so that when today adds +1, it becomes v
                recentEntry.streaksUsed[k]=Math.max(0,v-1);
                // Also clear the opposite streak in history
                const opposite=mutuallyExclusive[k];
                if(opposite) recentEntry.streaksUsed[opposite]=0;
                S.set(K.HIST,STATE.history);
              }
              // Clear override — natural calculation takes over
              delete STATE.streakOverrides[k];
              const opposite=mutuallyExclusive[k];
              if(opposite){
                delete STATE.streakOverrides[opposite];
                if(inputRefs[opposite]){inputRefs[opposite].value='';inputRefs[opposite].placeholder='auto';}
              }
              S.set(K.STREAK_OVR,STATE.streakOverrides);
              i.value='';
              i.placeholder='✓ seeded as '+v;
              SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
              refresh();
            }
          }
        }
      };
      row.appendChild(lbl2);row.appendChild(i);g.appendChild(row);
    });
    wrap.appendChild(g);return wrap;
  }

  card.appendChild(buildSection(streakDefs.filter(d=>d.section==='pos'),'✅ Positive Streaks','ac'));
  card.appendChild(buildSection(streakDefs.filter(d=>d.section==='neg'),'🔥 Reward Streaks','ng'));

  const note=dv('xs dimmer');
  note.textContent=t('set-streaks-note');
  card.appendChild(note);

  const clearBtn=bt('btn-ghost btn-sm mt10',t('clear-ovr'),()=>{STATE.streakOverrides={};S.set(K.STREAK_OVR,{});SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});refresh();});
  clearBtn.style.marginTop='10px';card.appendChild(clearBtn);
  return card;
}

/* ═══ DIARY (used inside calendar) ═══ */
function renderDiaryFor(dateKey){
  const wrap=dv('mt10 fi');
  const ta=document.createElement('textarea');
  ta.className='diary-area';
  ta.placeholder='Write your thoughts about this day...';
  ta.value=STATE.diary[dateKey]||'';

  let saveTimer=null;
  ta.oninput=()=>{
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      if(ta.value.trim()) STATE.diary[dateKey]=ta.value;
      else delete STATE.diary[dateKey];
      S.set(K.DIARY,STATE.diary);
      // Push immediately — no debounce, diary must sync
      SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
    },600);
  };

  const saved=dv('xs dimmer mt4','');
  ta.onfocus=()=>{saved.textContent='';};

  wrap.appendChild(ta);wrap.appendChild(saved);
  return wrap;
}

/* ═══ BOOT ═══ */
initTimezone();loadToday();applyTheme();

// On boot: if token exists, pull from cloud before first render
(async()=>{
  if(SB.init()){
    const remote=await SB.pull();
    applyRemote(remote);
    // Push any gap days created by loadToday() so both devices stay in sync
    SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
  }
  render();
})();
// Start clock ticker once (not inside renderApp to prevent accumulation)
let _lastDay=todayKey();
setInterval(()=>{
  const cl=document.getElementById('clk');
  if(cl)cl.textContent=new Date().toLocaleTimeString(STATE.lang==='es'?'es-MX':'en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const nd=todayKey();
  if(nd!==_lastDay){_lastDay=nd;refresh();}
},1000);
</script>
