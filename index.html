<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Stoic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
/* ── #9: zoom — max-width tighter + bigger base font ── */
:root{
  --bg:#09090f;--sur:#111118;--sur2:#17171f;--sur3:#1d1d26;
  --b1:#22222e;--b2:#2c2c3a;--b3:#3a3a4a;
  --t1:#f2f2f8;--t2:#b0b0cc;--t3:#707090;
  /* #10: warmer accent — soft amber-gold instead of cold teal */
  --ac:#f5a623;--ac2:#e09518;--acd:rgba(245,166,35,.13);--acb:rgba(245,166,35,.30);
  /* negative = red */
  --ng:#ff5566;--ngd:rgba(255,85,102,.13);--ngb:rgba(255,85,102,.30);
  /* status */
  --cr:#ff5566;--cy:#f5c842;--cg:#34d399;--cp:#a78bfa;
  --rd:rgba(255,85,102,.13);--yd:rgba(245,200,66,.13);--gd:rgba(52,211,153,.13);--pd:rgba(167,139,250,.13);
  --rb:rgba(255,85,102,.30);--yb:rgba(245,200,66,.30);--gb:rgba(52,211,153,.30);--pb:rgba(167,139,250,.30);
  --ff:'Outfit',sans-serif;--mo:'JetBrains Mono',monospace;
}
/* #9: base font 17px, max-width 1100px = natural 125–150% feel */
html,body{background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:20px;min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.55}
#root{max-width:1280px;margin:0 auto;padding:18px 24px 60px}

/* ── TYPOGRAPHY ── */
.mo{font-family:var(--mo)}
.xs{font-size:12px}.sm{font-size:14px}.md{font-size:16px}.lg{font-size:18px}.xl{font-size:23px}.xxl{font-size:30px}.xxxl{font-size:44px}
.w3{font-weight:300}.w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}.w7{font-weight:700}.w8{font-weight:800}
.dim{color:var(--t2)}.dimmer{color:var(--t3)}
.ac{color:var(--ac)}.ng{color:var(--ng)}
.cr{color:var(--cr)}.cy{color:var(--cy)}.cg{color:var(--cg)}.cp{color:var(--cp)}
.up{text-transform:uppercase}.ls{letter-spacing:.07em}
.ctr{text-align:center}

/* ── LAYOUT ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.row{display:flex;align-items:center}
.rowb{display:flex;align-items:center;justify-content:space-between}
.col{display:flex;flex-direction:column}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}
.f1{flex:1}.w100{width:100%}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}
.s4{display:flex;flex-direction:column;gap:4px}
.s6{display:flex;flex-direction:column;gap:6px}
.s8{display:flex;flex-direction:column;gap:8px}
.s10{display:flex;flex-direction:column;gap:10px}
.s12{display:flex;flex-direction:column;gap:12px}

/* ── CARD ── */
.card{background:var(--sur);border:1px solid var(--b1);border-radius:16px;padding:22px}
.card2{background:var(--sur2);border:1px solid var(--b1);border-radius:12px;padding:14px}
.card3{background:var(--sur3);border:1px solid var(--b1);border-radius:8px;padding:10px}
.ctit{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
hr.dv{border:none;border-top:1px solid var(--b1);margin:12px 0}

/* ── STATUS ── */
.s-red{background:var(--rd);border-color:var(--rb);color:var(--cr)}
.s-yellow{background:var(--yd);border-color:var(--yb);color:var(--cy)}
.s-green{background:var(--gd);border-color:var(--gb);color:var(--cg)}
.s-purple{background:var(--pd);border-color:var(--pb);color:var(--cp)}
.s-ac{background:var(--acd);border-color:var(--acb);color:var(--ac)}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border:1px solid}

/* ── INPUTS ── */
input[type=text],input[type=number],input[type=email],input[type=password],select{
  background:var(--sur2);border:1px solid var(--b2);border-radius:8px;
  color:var(--t1);font-family:var(--ff);font-size:16px;padding:10px 14px;
  outline:none;transition:border-color .15s,box-shadow .15s;width:100%
}
input:focus,select:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
input[type=checkbox]{accent-color:var(--ac);width:16px;height:16px;cursor:pointer;flex-shrink:0}
input[type=number]::-webkit-inner-spin-button{opacity:.3}

/* ── BUTTONS ── */
button{cursor:pointer;font-family:var(--ff);font-size:15px;font-weight:600;border-radius:9px;border:none;padding:10px 18px;transition:all .15s;line-height:1.3}
.btn-ac{background:var(--ac);color:#1a0e00;font-weight:800}
.btn-ac:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-ghost{background:var(--sur2);color:var(--t2);border:1px solid var(--b2)}
.btn-ghost:hover{color:var(--t1);border-color:var(--b3)}
.btn-ng{background:var(--ngd);color:var(--ng);border:1px solid var(--ngb)}
.btn-ng:hover{background:rgba(255,85,102,.22)}
.btn-icon{background:none;padding:4px 7px;color:var(--t3);border:none;border-radius:6px}
.btn-icon:hover{color:var(--t1);background:var(--sur3)}
.btn-sm{padding:6px 12px;font-size:13px}
.btn-xs{padding:3px 8px;font-size:12px;border-radius:5px}

/* ── TOGGLE ── */
.tog{display:flex;align-items:center;gap:12px;cursor:pointer;padding:13px 16px;border-radius:12px;border:1px solid var(--b1);background:var(--sur2);transition:all .15s;user-select:none}
.tog:hover{border-color:var(--b2)}
.tog.on{border-color:var(--ac);background:var(--acd)}
.tog.on .tt{color:var(--ac);font-weight:600}
.tt{font-size:16px;color:var(--t2)}
.ts{font-size:12px;color:var(--t3);margin-top:2px}

/* ── PROGRESS ── */
.prog{height:6px;border-radius:3px;background:var(--sur2);overflow:hidden}
.prog-f{height:100%;border-radius:3px;transition:width .3s}

/* ── STREAKS ── */
.sk-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.skc{border-radius:12px;padding:16px 12px;text-align:center;border:1px solid}
.skc.pos{background:var(--acd);border-color:var(--acb)}
.skc.neg{background:var(--ngd);border-color:var(--ngb)}
.skn{font-size:34px;font-weight:700;line-height:1;font-family:var(--mo)}
.skl{font-size:10px;color:var(--t3);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}

/* ── CALENDAR ── */
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-c{aspect-ratio:.9;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent;transition:all .12s;position:relative;overflow:hidden}
.cal-c:hover{filter:brightness(1.2)}
.cal-c.today{border-color:var(--ac)!important;box-shadow:0 0 0 1px var(--ac)}
.cal-c.sel{border-color:#fff!important}
.cal-num{font-size:14px;font-weight:800;position:relative;z-index:1}
.cal-pts{font-size:10px;font-weight:600;opacity:.95;margin-top:1px;font-family:var(--mo);position:relative;z-index:1}
/* #8: flag glow overlay */
.cal-flag-ring{position:absolute;inset:0;border-radius:6px;border:2px solid gold;box-shadow:inset 0 0 8px rgba(255,200,0,.3),0 0 8px rgba(255,200,0,.4);pointer-events:none;z-index:2}
.cal-flag-ico{position:absolute;top:1px;right:2px;font-size:14px;z-index:3;line-height:1}
.cal-hd{text-align:center;font-size:9px;color:var(--t3);padding:3px 0;text-transform:uppercase;letter-spacing:.05em}

/* ── PENALTY ITEM ── */
.pen-it{background:var(--sur2);border:1px solid var(--ngb);border-radius:8px;padding:9px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── HISTORY ROW ── */
.hr-row{padding:9px 12px;border-radius:8px;border:1px solid var(--b1);background:var(--sur2);cursor:pointer;transition:border-color .15s}
.hr-row:hover{border-color:var(--b2)}
.hr-row.ed{border-color:var(--ac);background:var(--acd)}

/* ── SECTION TOGGLE ── */
.sec-t{width:100%;display:flex;align-items:center;justify-content:space-between;background:none;border:none;padding:0 0 14px;color:var(--t3);cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.sec-t:hover{color:var(--t2)}

/* ── MISC ── */
.circ{transform:rotate(-90deg)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--cg);display:inline-block;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes fi{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.fi{animation:fi .18s ease}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}

@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.sk-g{grid-template-columns:repeat(2,1fr)}}
@media(max-width:580px){.g4{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.xxxl{font-size:30px}.xxl{font-size:24px}}

/* ── LIGHT MODE ── */
body.light{--bg:#f4f4f0;--sur:#ffffff;--sur2:#efefeb;--sur3:#e5e5e0;--b1:#ddddd8;--b2:#cacac4;--b3:#b0b0aa;--t1:#1a1a1a;--t2:#555550;--t3:#888880}
body.light .cal-c:hover{filter:brightness(.95)}
/* ── DIARY ── */
.diary-area{width:100%;min-height:90px;resize:vertical;background:var(--sur2);border:1px solid var(--b2);border-radius:8px;color:var(--t1);font-family:var(--ff);font-size:15px;padding:10px 14px;outline:none;transition:border-color .15s;line-height:1.6}
.diary-area:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
</style>

<script>
/* ═══ STOIC by JuanFer — single file, vanilla JS, no frameworks ═══
   Single source of truth: CALC object.
   Auto-midnight reset. Auto-save on every change.
   ════════════════════════════════════════════════════════════════ */

const S={
  get(k,fb=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};
const K={TODAY:'st_today',HIST:'st_hist',AUTH:'st_auth',DIARY:'st_diary',THEME:'st_theme',STREAK_OVR:'st_streak_ovr'};

/* ── SUPABASE SYNC ──────────────────────────────────────────────────
   Uses window._SUPABASE_URL and window._SUPABASE_KEY if set.
   Table: stoic_data (user_id uuid PK, history jsonb, today jsonb)
   Falls back to localStorage silently if not configured.
   ────────────────────────────────────────────────────────────────── */
const SB={
  url: null, key: null, token: null,
  init(){
    // Accept URL with or without trailing /rest/v1/
    const raw = window._SUPABASE_URL||'';
    this.url = raw.replace(/\/rest\/v1\/?$/,'').replace(/\/+$/,'');
    this.key = window._SUPABASE_KEY||'';
    this.token = localStorage.getItem('AUTH_TOKEN')||'';
    return !!(this.url && this.key && this.token);
  },
  headers(){
    return {'Content-Type':'application/json','apikey':this.key,'Authorization':`Bearer ${this.token}`};
  },
  async push(history, today, diary, streakOverrides){
    if(!this.init()) return;
    try{
      const res=await fetch(`${this.url}/rest/v1/stoic_data`, {
        method:'POST',
        headers:{...this.headers(),'Prefer':'resolution=merge-duplicates,return=minimal'},
        body:JSON.stringify({
          user_id: this.userId(),
          history: history,
          today: today,
          diary: diary||{},
          streak_overrides: streakOverrides||{},
          saved_at: Date.now(),
          updated_at: new Date().toISOString()
        })
      });
      if(!res.ok){const t=await res.text();console.warn('Push failed:',res.status,t);}
    }catch(e){console.warn('Supabase push failed',e);}
  },
  async pull(){
    if(!this.init()) return null;
    try{
      const r=await fetch(`${this.url}/rest/v1/stoic_data?select=history,today,diary,streak_overrides,saved_at&limit=1`,{headers:this.headers()});
      if(!r.ok) return null;
      const rows=await r.json();
      return rows&&rows.length?rows[0]:null;
    }catch(e){console.warn('Supabase pull failed',e);return null;}
  },
  userId(){
    // Extract user_id from JWT token without external library
    try{
      const payload=this.token.split('.')[1];
      const decoded=JSON.parse(atob(payload.replace(/-/g,'+').replace(/_/g,'/')));
      return decoded.sub||null;
    }catch{return null;}
  },
  async login(email,password){
    this.url=(window._SUPABASE_URL||'').replace(/\/rest\/v1\/?$/,'').replace(/\/+$/,'');
    this.key=window._SUPABASE_KEY||'';
    if(!this.url||!this.key) return{error:'Supabase not configured'};
    try{
      const r=await fetch(`${this.url}/auth/v1/token?grant_type=password`,{
        method:'POST',
        headers:{'Content-Type':'application/json','apikey':this.key,'Authorization':`Bearer ${this.key}`},
        body:JSON.stringify({email,password})
      });
      const d=await r.json();
      if(d.access_token){
        this.token=d.access_token;
        localStorage.setItem('AUTH_TOKEN',d.access_token);
        return{ok:true};
      }
      return{error:d.error_description||d.msg||'Login failed'};
    }catch(e){return{error:'Network error'};}
  }
};
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}

function parseDur(s){
  if(!s||!s.trim())return{v:0};s=s.trim();let m;
  if(m=s.match(/^(\d+)h(\d+)m$/))return{v:+m[1]*60+ +m[2]};
  if(m=s.match(/^(\d+(?:\.\d+)?)h$/))return{v:Math.round(parseFloat(m[1])*60)};
  if(m=s.match(/^(\d+)m$/))return{v:+m[1]};
  const n=parseInt(s);if(!isNaN(n)&&n>=0)return{v:n};
  return{v:null,err:'Use: 5h, 300m, 2h30m or number (minutes)'};
}
function fmtDur(min){
  if(!min)return'0m';const h=Math.floor(min/60),m=min%60;
  if(!h)return m+'m';if(!m)return h+'h';return h+'h'+m+'m';
}
function todayKey(){return new Date().toISOString().split('T')[0]}

/* ═══ CALC — SINGLE SOURCE OF TRUTH ═══ */
const CALC={
  status(pct,flag){
    let s=pct>=100?'purple':pct>=85?'green':pct>=50?'yellow':'red';
    if(flag){const u={red:'yellow',yellow:'green',green:'purple',purple:'purple'};s=u[s];}
    return s;
  },
  colorBonus(s){return{purple:30,green:20,yellow:10,red:0}[s]||0},
  penBase(p){
    if(p.type==='drugs')return -25*(p.details?.substances||1);
    if(p.type==='internet')return -1*(p.details?.minutes||0);
    if(p.type==='macanazo')return p.details?.isPositive?100:-100;
    return 0;
  },
  streaks(history,today){
    const tk=todayKey();
    // #1 FIX: exclude today from history scan entirely
    const hist=[...history].filter(d=>d.date!==tk).sort((a,b)=>new Date(a.date)-new Date(b.date));
    const hasPen=(d,t)=>d.penalties?.some(p=>p.type===t)||false;
    const hasSt=(d,t)=>d.streaks?.some(s=>s.type===t&&s.active)||false;
    function pStrk(type,resetOn){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hasPen(hist[i],type))break;if(resetOn.includes(hist[i].status))break;c++;}return c;}
    function aStrk(type){let c=0;for(let i=hist.length-1;i>=0;i--){if(hasPen(hist[i],type))break;c++;}return c;}
    function sStrk(type){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hasSt(hist[i],type))break;c++;}return c;}
    function wStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(hist[i].status==='red')break;c++;}return c;}
    function eStrk(){let c=0;for(let i=hist.length-1;i>=0;i--){if(!hist[i].sleptEarly)break;c++;}return c;}
    const tD=today.penalties.some(p=>p.type==='drugs');
    const tN=today.penalties.some(p=>p.type==='internet');
    const tM=today.penalties.some(p=>p.type==='macanazo');
    return{
      substancesPenaltyStreak:pStrk('drugs',['yellow','green','purple'])+(tD?1:0),
      procrastinationPenaltyStreak:pStrk('internet',['green','purple'])+(tN?1:0),
      macanazoPenaltyStreak:pStrk('macanazo',['purple'])+(tM?1:0),
      substancesStreak:tD?0:aStrk('drugs'),
      procrastinationStreak:tN?0:aStrk('internet'),
      macanazoStreak:tM?0:aStrk('macanazo'),
      morningStreak:sStrk('morning')+(today.morningCompleted?1:0),
      flagStreak:sStrk('flags')+(today.flagCompleted?1:0),
      workStreak:wStrk()+(today.work?.workDuration>0?1:0),
      earlyBedStreak:eStrk()+(today.sleep?.sleptEarly?1:0),
    };
  },
  score(day,sk){
    const{completed=0,target=0,morningCompleted=false,flagCompleted=false,pomodoros=0,penalties=[],sleep={},work={}}=day;
    const s=sk||{morningStreak:0,flagStreak:0,substancesPenaltyStreak:1,procrastinationPenaltyStreak:1,macanazoPenaltyStreak:1};
    const base=completed;
    const mB=morningCompleted&&completed>=13?25*Math.max(1,s.morningStreak):0;
    const fB=flagCompleted?100*Math.max(1,s.flagStreak):0;
    const pom=pomodoros*25;
    const wrk=work.workDuration||0;
    const slp=(sleep.sleepDuration||0)+(sleep.napDuration||0)+(sleep.sleptEarly?(sleep.sleepDuration||0)*(sleep.earlyBedStreak||1):0);
    const procMins=penalties.filter(p=>p.type==='internet').reduce((a,p)=>a+(p.details?.minutes||0),0);
    const procActive=procMins>=30;
    const pen=penalties.reduce((sum,p)=>{
      const b=this.penBase(p);let mult=1;
      if(p.type==='drugs')mult=Math.max(1,s.substancesPenaltyStreak);
      else if(p.type==='internet')mult=procActive?Math.max(1,s.procrastinationPenaltyStreak):0;
      else if(p.type==='macanazo')mult=Math.max(1,s.macanazoPenaltyStreak);
      return sum+b*mult;
    },0);
    const pct=target>0?Math.round(completed/target*100):0;
    const status=this.status(pct,flagCompleted);
    const col=this.colorBonus(status);
    const total=base+mB+fB+pom+wrk+slp+pen+col;
    return{total,status,pct,mB,fB,pom,wrk,slp,pen,col};
  },
  // #2 FIX: histTotal must exclude today to avoid double-count
  histTotal(history){
    const tk=todayKey();
    return history.filter(h=>h.date!==tk).reduce((s,d)=>s+(d.todayPoints||0),0);
  },
  buildEntry(today,streaks,date){
    const sc=this.score(today,streaks);
    return{date,todayPoints:sc.total,status:sc.status,
      completedTasks:today.completed,totalTasks:today.target,pomodoros:today.pomodoros,
      penalties:today.penalties.map(p=>({type:p.type,count:p.count,points:this.penBase(p),streak:1})),
      streaks:[{type:'morning',count:today.morningCompleted?1:0,active:today.morningCompleted},{type:'flags',count:today.flagCompleted?1:0,active:today.flagCompleted}],
      sleepDuration:today.sleep?.sleepDuration||0,napDuration:today.sleep?.napDuration||0,
      sleptEarly:today.sleep?.sleptEarly||false,workDuration:today.work?.workDuration||0,
      streaksUsed:{...streaks}};
  },
  /* #6: fill missing days between first and last history entry as red -1000 */
  fillGaps(history){
    if(history.length<2)return history;
    const map=new Map(history.map(d=>[d.date,d]));
    const dates=history.map(d=>d.date).sort();
    const start=new Date(dates[0]),end=new Date(dates[dates.length-1]);
    const result=[];
    for(let d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
      const k=d.toISOString().split('T')[0];
      result.push(map.get(k)||{date:k,todayPoints:-1000,status:'red',completedTasks:0,totalTasks:0,pomodoros:0,penalties:[],streaks:[],workDuration:0,sleepDuration:0,napDuration:0,sleptEarly:false,_gap:true});
    }
    return result;
  }
};

/* ═══ #1 FIX: loadToday checks for missed days, fills all gaps ═══ */
function loadToday(){
  const t=S.get(K.TODAY,null);
  if(t){STATE.today={...STATE.today,...t};if(t._penType)STATE.penType=t._penType;}
  const tk=todayKey();
  const saved=STATE.today._date||'';
  if(saved&&saved!==tk){
    // might have missed multiple days — fill each missing day as -1000 gap
    const savedDate=new Date(saved);
    const nowDate=new Date(tk);
    const daysDiff=Math.round((nowDate-savedDate)/(1000*60*60*24));
    // save the actual last-used day
    const sk=CALC.streaks(STATE.history,STATE.today);
    upsertHist(CALC.buildEntry(STATE.today,sk,saved),saved);
    // fill any days between saved and today as gap days
    for(let i=1;i<daysDiff;i++){
      const gapDate=new Date(savedDate);gapDate.setDate(gapDate.getDate()+i);
      const gk=gapDate.toISOString().split('T')[0];
      if(!STATE.history.find(h=>h.date===gk)){
        upsertHist({date:gk,todayPoints:-1000,status:'red',completedTasks:0,totalTasks:0,pomodoros:0,penalties:[],streaks:[],workDuration:0,sleepDuration:0,napDuration:0,sleptEarly:false,_gap:true},gk);
      }
    }
    // reset today
    STATE.today={completed:0,target:0,morningCompleted:false,flagCompleted:false,
      pomodoros:0,penalties:[],
      sleep:{sleepDuration:0,napDuration:0,sleptEarly:false,earlyBedStreak:STATE.today.sleep?.earlyBedStreak||0},
      work:{workDuration:0},_date:tk};
  }
  if(!STATE.today._date)STATE.today._date=tk;
}

function upsertHist(entry,dk){
  const idx=STATE.history.findIndex(h=>h.date===dk);
  if(idx>=0)STATE.history[idx]={...STATE.history[idx],...entry};
  else STATE.history.unshift(entry);
  STATE.history=STATE.history.slice(0,200);
}

/* save: local + push to Supabase if logged in */
function save(){
  const tk=todayKey();STATE.today._date=tk;STATE.today._penType=STATE.penType;
  STATE.today._ts=Date.now();
  STATE._savedAt=Date.now(); // track when this device last saved
  const sk=CALC.streaks(STATE.history,STATE.today);
  upsertHist(CALC.buildEntry(STATE.today,sk,tk),tk);
  S.set(K.TODAY,STATE.today);S.set(K.HIST,STATE.history);S.set(K.DIARY,STATE.diary);S.set(K.THEME,STATE.theme);S.set(K.STREAK_OVR,STATE.streakOverrides);S.set('st_saved_at',STATE._savedAt);
  // push to cloud — fire and forget
  SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
}


function applyTheme(){
  document.body.className=STATE.theme==='light'?'light':'';

/* ═══ BACKGROUND SYNC — pulls from cloud every 30s if logged in ═══ */
function mergeRemote(remote){
  if(!remote) return false;
  // Simple rule: remote saved_at vs local saved_at — newest wins everything
  const remoteSavedAt = remote.saved_at||0;
  const localSavedAt  = STATE._savedAt||0;
  if(remoteSavedAt <= localSavedAt) return false; // local is newer, ignore remote
  // Remote is newer — take everything from remote
  let changed=false;
  if(remote.history&&JSON.stringify(remote.history)!==JSON.stringify(STATE.history)){
    STATE.history=remote.history;S.set(K.HIST,STATE.history);changed=true;
  }
  if(remote.today&&JSON.stringify(remote.today)!==JSON.stringify(STATE.today)){
    STATE.today=remote.today;S.set(K.TODAY,STATE.today);changed=true;
  }
  if(remote.diary&&JSON.stringify(remote.diary)!==JSON.stringify(STATE.diary)){
    STATE.diary=remote.diary;S.set(K.DIARY,STATE.diary);changed=true;
  }
  const remoteOvr=remote.streak_overrides||{};
  if(JSON.stringify(remoteOvr)!==JSON.stringify(STATE.streakOverrides||{})){
    STATE.streakOverrides=remoteOvr;S.set(K.STREAK_OVR,STATE.streakOverrides);changed=true;
  }
  if(changed) STATE._savedAt=remoteSavedAt;
  return changed;
}

async function bgSync(){
  if(!STATE.authed||!SB.init()) return;
  const remote=await SB.pull();
  if(mergeRemote(remote)) render();
}
setInterval(bgSync,15000); // every 15s

/* ═══ CALENDAR — #5 pts visible, #8 flag glow ═══ */

  function build(){
    wrap.innerHTML='';

    const pv=bt('btn-icon','‹',()=>{cM--;if(cM<0){cM=11;cY--;}build();});pv.style.fontSize='20px';
    const nx=bt('btn-icon','›',()=>{cM++;if(cM>11){cM=0;cY++;}build();});nx.style.fontSize='20px';

    // also merge STATE.history (gaps might not be in STATE yet)
    STATE.history.forEach(d=>hMap.set(d.date,d));

    const dim=new Date(cY,cM+1,0).getDate();const fd=new Date(cY,cM,1).getDay();
    const tk=now.toISOString().split('T')[0];

    ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>cg.appendChild(dv('cal-hd',d)));
    for(let i=0;i<fd;i++)cg.appendChild(dv(''));
    for(let d=1;d<=dim;d++){
      const key=new Date(cY,cM,d).toISOString().split('T')[0];
      const entry=hMap.get(key);

      // #5: always show pts if entry exists
      if(entry){const pts=sp('cal-pts',String(entry.todayPoints||0));pts.style.color=bg.txt;cell.appendChild(pts);}
      cell.onclick=()=>{selK=key===selK?null:key;build();};
      cg.appendChild(cell);
    }
    wrap.appendChild(cg);
    if(selK){

        det.appendChild(sp('xs dim',selK));

          diaryToggle.textContent='📝 '+(STATE.diary[selK]?'Edit note':'Add note');

/* ═══ CLOUD SYNC PANEL ═══ */
function renderSyncPanel(){
  const card=dv('card fi mb12');
  card.style.cssText='border:1px solid var(--acb);background:var(--acd)';
  const hd=dv('rowb mb12');
  hd.appendChild(sp('ctit','☁ Cloud Sync — Supabase'));
  hd.appendChild(bt('btn-icon','✕',()=>{STATE.showSyncPanel=false;refresh()}));
  card.appendChild(hd);
  const sbConfigured=!!(window._SUPABASE_URL&&window._SUPABASE_KEY);
  if(!sbConfigured){
    card.appendChild(dv('sm dim','Supabase not configured. Add window._SUPABASE_URL and window._SUPABASE_KEY to the HTML.'));
    return card;
  }
  const hasToken=!!(localStorage.getItem('AUTH_TOKEN'));
  if(hasToken){
    const info=dv('sm cg mb8');info.textContent='✅ Logged in — sync is active.';card.appendChild(info);
    const row=dv('row gap8');
    row.appendChild(bt('btn-ac btn-sm','Pull from cloud',async()=>{
      const remote=await SB.pull();
      if(remote){
        const merged=new Map();
        [...(STATE.history||[]),...(remote.history||[])].forEach(d=>merged.set(d.date,d));
        STATE.history=[...merged.values()].sort((a,b)=>b.date.localeCompare(a.date));
        S.set(K.HIST,STATE.history);
        refresh();alert('Synced from cloud!');
      } else alert('Pull failed or no data.');
    }));
    row.appendChild(bt('btn-ghost btn-sm','Push to cloud',async()=>{
      await SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides);alert('Pushed to cloud!');
    }));
    row.appendChild(bt('btn-ng btn-sm','Log out',()=>{
      localStorage.removeItem('AUTH_TOKEN');STATE.showSyncPanel=false;refresh();
    }));
    card.appendChild(row);
    return card;
  }
  // Not logged in — show login form
  card.appendChild(dv('sm dim mb10','Log in with your Supabase account to enable cross-device sync.'));
  const ew=dv('s4 mb8');ew.innerHTML='<div class="xs dimmer up ls">Email</div>';
  const ei=ip('email','','','you@email.com');ew.appendChild(ei);card.appendChild(ew);
  const pw=dv('s4 mb8');pw.innerHTML='<div class="xs dimmer up ls">Password</div>';
  const pi=ip('password','','','password');pw.appendChild(pi);card.appendChild(pw);
  const err=dv('xs ng mb8');card.appendChild(err);
  const loginBtn=bt('btn-ac btn-sm','Log In',async()=>{
    err.textContent='';loginBtn.disabled=true;loginBtn.textContent='Logging in...';
    const res=await SB.login(ei.value.trim(),pi.value);
    if(res.ok){STATE.showSyncPanel=false;refresh();}
    else{err.textContent=res.error||'Login failed';loginBtn.disabled=false;loginBtn.textContent='Log In';}
  });
  pi.onkeydown=e=>{if(e.key==='Enter')loginBtn.click();};
  card.appendChild(loginBtn);
  return card;
}

/* ═══ STREAK OVERRIDE PANEL ═══ */
function renderStreakPanel(){
  const card=dv('card fi mb12');
  card.style.cssText='border:1px solid var(--acb);background:var(--acd)';

  const hd=dv('rowb mb12');
  hd.appendChild(sp('ctit','⚡ Set Historical Streaks'));
  hd.appendChild(bt('btn-icon','✕',()=>{STATE.showStreakPanel=false;refresh()}));
  card.appendChild(hd);

  const info=dv('sm dim mb12');
  info.innerHTML='Set your real streak counts here — use this if you have been tracking manually and want the app to reflect your true history without editing day by day.';
  card.appendChild(info);

  const ovr=STATE.streakOverrides;
  const streakDefs=[
    {k:'morningStreak',l:'Morning Routine',emoji:'🌅'},
    {k:'flagStreak',l:'Goals Annihilated',emoji:'🏅'},
    {k:'workStreak',l:'Work',emoji:'💼'},
    {k:'substancesStreak',l:'Clean — Substances',emoji:'✅'},
    {k:'procrastinationStreak',l:'Clean — Procrastination',emoji:'✅'},
    {k:'macanazoStreak',l:'Clean — Macanazo',emoji:'✅'},
    {k:'substancesPenaltyStreak',l:'Substances 🔥 streak',emoji:'💊'},
    {k:'procrastinationPenaltyStreak',l:'Procrastination 🔥 streak',emoji:'🌐'},
    {k:'macanazoPenaltyStreak',l:'Orgasm 💦 streak',emoji:'💦'},
  ];

  const g=dv('g2 mb12');g.style.gap='8px';
  streakDefs.forEach(({k,l,emoji})=>{
    const row=dv('card2 row gap10');
    const lbl=dv('f1 sm');lbl.textContent=emoji+' '+l;
    const i=ip('number','',ovr[k]!==undefined?ovr[k]:'','auto');
    i.min=0;i.style.cssText='width:80px;flex:0 0 auto;text-align:center';
    i.placeholder='auto';
    i.oninput=()=>{
      const v=parseInt(i.value);
      if(!isNaN(v)&&v>=0) STATE.streakOverrides[k]=v;
      else delete STATE.streakOverrides[k];
      S.set(K.STREAK_OVR,STATE.streakOverrides);
      // push immediately so other devices get the update
      SB.push(STATE.history,STATE.today,STATE.diary,STATE.streakOverrides).catch(()=>{});
    };
    row.appendChild(lbl);row.appendChild(i);g.appendChild(row);
  });
  card.appendChild(g);

  const note=dv('xs dimmer');
  note.innerHTML='Leave blank to use the calculated value. Overrides apply to today\'s score immediately. They do not modify your history.';
  card.appendChild(note);

  const clearBtn=bt('btn-ghost btn-sm mt10','Clear all overrides',()=>{STATE.streakOverrides={};S.set(K.STREAK_OVR,{});refresh();});
  clearBtn.style.marginTop='10px';card.appendChild(clearBtn);
  return card;
}

/* ═══ DIARY (used inside calendar) ═══ */
function renderDiaryFor(dateKey){
  const wrap=dv('mt10 fi');
  const ta=document.createElement('textarea');
  ta.className='diary-area';
  ta.placeholder='Write your thoughts about this day...';
  ta.value=STATE.diary[dateKey]||'';

  let saveTimer=null;
  ta.oninput=()=>{
    clearTimeout(saveTimer);
    saveTimer=setTimeout(()=>{
      if(ta.value.trim()) STATE.diary[dateKey]=ta.value;
      else delete STATE.diary[dateKey];
      S.set(K.DIARY,STATE.diary);
      SB.push(STATE.history,STATE.today).catch(()=>{});
    },600);
  };

  const saved=dv('xs dimmer mt4','');
  ta.onfocus=()=>{saved.textContent='';};

  wrap.appendChild(ta);wrap.appendChild(saved);
  return wrap;
}

/* ═══ BOOT ═══ */
loadToday();applyTheme();

// On boot: if token exists, pull from cloud before first render
(async()=>{
  if(SB.init()){
    const remote=await SB.pull();
    mergeRemote(remote);
  }
  render();
})();
// Start clock ticker once (not inside renderApp to prevent accumulation)
let _lastDay=todayKey();
setInterval(()=>{
  const cl=document.getElementById('clk');
  if(cl)cl.textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const nd=todayKey();
  if(nd!==_lastDay){_lastDay=nd;refresh();}
},1000);
